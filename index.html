<!doctype html>
<html lang="fr">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="theme-color" content="#081b34">
<meta name="description" content="Carte de visite interactive de Thomas Bailly — Bailly Immobilier.">
<title>Bailly Immobilier — Thomas Bailly</title>
<link rel="icon" href="logo-bailly.png">
<style>
:root{
  --navy:#07172c;
  --navy-card:#0b2a4e;
  --navy-card-2:#0a2342;
  --gold:#c9a45f;
  --gold-light:#ead7aa;
  --ivory:#fbf8f1;
  --muted:#c5cdd7;
  --line:rgba(234,215,170,.22);
  --shadow:rgba(0,0,0,.34);
}
*{box-sizing:border-box}
html,body{min-height:100%}
body{
  margin:0;
  color:var(--ivory);
  font-family:Georgia,"Times New Roman",serif;
  background:
    radial-gradient(circle at 50% -10%,rgba(201,164,95,.13),transparent 34rem),
    linear-gradient(145deg,#050e1b 0%,#07172c 48%,#0a2442 100%);
}
.shell{
  min-height:100vh;
  display:grid;
  place-items:center;
  padding:22px 14px 30px;
}
.card{
  width:min(100%,440px);
  padding:28px 22px 30px;
  border:1px solid var(--line);
  border-radius:30px;
  background:
    linear-gradient(180deg,rgba(17,56,96,.96),rgba(8,29,54,.98));
  box-shadow:
    0 26px 70px var(--shadow),
    inset 0 1px 0 rgba(255,255,255,.035);
}
.hero{
  text-align:center;
}
.logo-wrap{
  width:132px;
  height:132px;
  margin:0 auto 22px;
  padding:4px;
  border-radius:50%;
  background:linear-gradient(145deg,var(--gold-light),rgba(201,164,95,.22));
  box-shadow:0 16px 34px rgba(0,0,0,.28);
}
.logo-wrap img{
  width:100%;
  height:100%;
  display:block;
  border-radius:50%;
  object-fit:cover;
}
.brand{
  margin:0 0 13px;
  color:var(--gold-light);
  font-size:1.52rem;
  line-height:1.08;
  letter-spacing:.14em;
  font-weight:700;
}
.name{
  margin:0 0 8px;
  color:var(--ivory);
  font-size:1.08rem;
  letter-spacing:.055em;
  font-weight:600;
}
.role{
  margin:0;
  color:var(--gold-light);
  font-size:.78rem;
  line-height:1.3;
  letter-spacing:.13em;
  font-weight:700;
  text-transform:uppercase;
}
.tagline{
  margin:14px 0 0;
  color:var(--muted);
  font-size:.9rem;
  line-height:1.35;
}
.tagline span{
  color:var(--gold);
  padding:0 4px;
}
.divider{
  height:1px;
  margin:24px 0 22px;
  background:linear-gradient(90deg,transparent,var(--gold),transparent);
  opacity:.72;
}
.actions{
  display:grid;
  gap:13px;
}
.action{
  min-height:70px;
  padding:13px 14px;
  border:1px solid var(--line);
  border-radius:18px;
  display:flex;
  align-items:center;
  gap:13px;
  color:var(--ivory);
  text-decoration:none;
  background:linear-gradient(180deg,rgba(255,255,255,.045),rgba(255,255,255,.02));
  box-shadow:inset 0 1px 0 rgba(255,255,255,.025);
  transition:transform .16s ease, border-color .16s ease, background .16s ease;
}
.action:hover{
  transform:translateY(-1px);
  border-color:rgba(234,215,170,.42);
  background:rgba(255,255,255,.065);
}
.action:active{transform:scale(.992)}
.action.primary{
  color:#061426;
  border-color:transparent;
  background:linear-gradient(145deg,#dfc17d,#bd934d);
  box-shadow:
    0 10px 24px rgba(201,164,95,.16),
    inset 0 1px 0 rgba(255,255,255,.28);
}
.action.emphasis{
  border-color:rgba(201,164,95,.48);
  background:linear-gradient(180deg,rgba(201,164,95,.085),rgba(201,164,95,.035));
}
.icon-wrap{
  width:38px;
  height:38px;
  flex:0 0 38px;
  border-radius:50%;
  display:grid;
  place-items:center;
  color:var(--gold-light);
  background:rgba(201,164,95,.12);
}
.primary .icon-wrap{
  color:#061426;
  background:rgba(6,20,38,.12);
}
.icon{
  width:19px;
  height:19px;
  fill:none;
  stroke:currentColor;
  stroke-width:1.8;
  stroke-linecap:round;
  stroke-linejoin:round;
}
.copy{
  min-width:0;
  display:flex;
  flex-direction:column;
  gap:4px;
}
.copy strong{
  font:700 .94rem/1.2 Arial,sans-serif;
}
.copy small{
  color:var(--muted);
  font:400 .74rem/1.28 Arial,sans-serif;
  overflow:hidden;
  text-overflow:ellipsis;
  white-space:nowrap;
}
.primary .copy small{
  color:rgba(6,20,38,.68);
}
.arrow{
  margin-left:auto;
  color:var(--gold-light);
  font:400 1.5rem/1 Arial,sans-serif;
}
.primary .arrow{
  color:#061426;
}
.info{
  margin-top:26px;
  padding:0 8px;
  display:flex;
  align-items:flex-start;
  gap:12px;
}
.info-icon{
  width:30px;
  height:30px;
  flex:0 0 30px;
  display:grid;
  place-items:center;
  color:var(--gold-light);
}
.info .copy strong{
  color:var(--ivory);
  font-size:.86rem;
}
.info .copy small{
  color:var(--muted);
  font-size:.76rem;
}
.bottom-space{
  height:30px;
}
@media(max-width:360px){
  .card{padding:24px 16px 26px}
  .logo-wrap{width:120px;height:120px}
  .brand{font-size:1.32rem}
  .name{font-size:1rem}
  .action{min-height:66px}
}
</style>
</head>
<body>
<main class="shell">
<section class="card">

<header class="hero">
  <div class="logo-wrap">
    <img src="logo-bailly.png" alt="Logo Bailly Immobilier">
  </div>
  <h1 class="brand">BAILLY IMMOBILIER</h1>
  <p class="name">Thomas BAILLY</p>
  <p class="role">Marchand de biens</p>
  <p class="tagline">Acquisition <span>•</span> Rénovation <span>•</span> Revente</p>
</header>

<div class="divider"></div>

<section class="actions">
  <a class="action primary" href="tel:+33618897932">
    <span class="icon-wrap" aria-hidden="true">
      <svg class="icon" viewBox="0 0 24 24">
        <path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6A19.79 19.79 0 0 1 2.12 4.18 2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72c.13.96.36 1.9.68 2.8a2 2 0 0 1-.45 2.11L8.09 9.88a16 16 0 0 0 6 6l1.25-1.25a2 2 0 0 1 2.11-.45c.9.32 1.84.55 2.8.68A2 2 0 0 1 22 16.92z"/>
      </svg>
    </span>
    <span class="copy" style="align-items:center;">
      <strong>Appeler</strong>
      <small>06 18 89 79 32</small>
    </span>
    <span class="arrow">›</span>
  </a>

  <a class="action" href="mailto:contact.bailly.immobilier@gmail.com">
    <span class="icon-wrap" aria-hidden="true">
      <svg class="icon" viewBox="0 0 24 24">
        <rect x="3" y="5" width="18" height="14" rx="1.5"/>
        <path d="m4 7 8 6 8-6"/>
      </svg>
    </span>
    <span class="copy">
      <strong>Envoyer un e-mail</strong>
      <small>contact.bailly.immobilier@gmail.com</small>
    </span>
    <span class="arrow">›</span>
  </a>

  <a class="action emphasis" href="mailto:contact.bailly.immobilier@gmail.com?subject=Proposition%20de%20bien%20immobilier&body=Bonjour%20Thomas%2C%0A%0AJe%20souhaite%20vous%20proposer%20le%20bien%20suivant%20%3A%0A%0AType%20de%20bien%20%3A%0ALocalisation%20%3A%0APrix%20%3A%0ATravaux%20%C3%A0%20pr%C3%A9voir%20%3A%0AInformations%20compl%C3%A9mentaires%20%3A%0A">
    <span class="icon-wrap" aria-hidden="true">
      <svg class="icon" viewBox="0 0 24 24">
        <path d="M3 11.5 12 4l9 7.5"/>
        <path d="M5 10.5V20h14v-9.5"/>
        <path d="M9 20v-6h6v6"/>
      </svg>
    </span>
    <span class="copy">
      <strong>Me proposer un bien</strong>
      <small>Envoyer les informations du bien</small>
    </span>
    <span class="arrow">›</span>
  </a>
</section>

<section class="info" aria-label="Secteur d'intervention" style="justify-content:center;text-align:center;">
  <span class="info-icon" aria-hidden="true">
    <svg class="icon" viewBox="0 0 24 24">
      <path d="M20 10c0 5-8 12-8 12S4 15 4 10a8 8 0 1 1 16 0z"/>
      <circle cx="12" cy="10" r="2.5"/>
    </svg>
  </span>
  <span class="copy">
    <strong>Secteur d’intervention</strong>
    <small>Béziers et alentours</small>
  </span>
</section>

<div class="bottom-space" aria-hidden="true"></div>

</section>
</main>
</body>
</html>
